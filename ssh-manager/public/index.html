<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程操作面板</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="vendor/xterm/xterm.css">
</head>
<body>
    <div class="app">
        <!-- 顶部栏 -->
        <div class="header">
            <div class="menu-btn" id="menuBtn">☰</div>
            <div class="path" id="pathDisplay">/</div>
        </div>

        <!-- 终端标签栏 -->
        <div class="terminal-bar" id="terminalBar">
            <div class="term-tab" id="addTerminalBtn">+</div>
        </div>

        <!-- 终端容器（覆盖在文件区域之上） -->
        <div id="terminalContainer" style="display:none;flex:1;flex-direction:column;"></div>

        <!-- 双栏文件 -->
        <div id="panelsContainer" style="flex:1;display:flex;flex-direction:column;">
            <div class="panels" style="flex:1;display:flex;">
                <div class="panel">
                    <div class="panel-header" id="panelLeftHeader">/</div>
                    <div class="panel-body" id="panelLeftBody" data-panel="left"></div>
                </div>
                <div class="panel">
                    <div class="panel-header" id="panelRightHeader">/</div>
                    <div class="panel-body" id="panelRightBody" data-panel="right"></div>
                </div>
            </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="toolbar">
            <div class="tool-btn" id="btnExecute">▶️</div>
            <div class="tool-btn" id="btnFind">🔍</div>
            <div class="tool-btn" id="btnCreate">➕</div>
            <div class="tool-btn" id="btnSync">⇆</div>
            <div class="tool-btn" id="btnBack">↑</div>
        </div>
    </div>

    <!-- 操作浮层 -->
    <div class="action-overlay" id="actionOverlay"></div>
    <!-- 查找弹窗 -->
    <div class="modal-overlay" id="findModal"></div>
    <!-- 新建弹窗 -->
    <div class="modal-overlay" id="createModal"></div>
    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal"></div>

    <!-- 第三方库本地引入 -->
    <script src="vendor/xterm/xterm.js"></script>
    <script src="vendor/xterm/xterm-addon-fit.min.js"></script>

    <!-- 项目 JS -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/history.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/message-handler.js"></script>
    <script src="js/panels.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/dialogs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
